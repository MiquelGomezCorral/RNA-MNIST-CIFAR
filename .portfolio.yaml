title:
  en: Neural Network Training on MNIST & CIFAR-10
  es: "Entrenamiento de Redes Neuronales: MNIST y CIFAR-10"
finished: finished
descriptionShort:
  en: Basic PyTorch implementation for training MLPs and CNNs on MNIST and CIFAR-10 datasets. CLI with configurable hyperparameters (batch size, learning rate, weight decay, label smoothing, dropout). Achieves 99.4% on MNIST and 90%+ on CIFAR-10.
  es: Implementación básica en PyTorch para entrenar MLPs y CNNs sobre MNIST y CIFAR-10. CLI con hiperparámetros configurables (batch size, learning rate, weight decay, label smoothing, dropout). Alcanza 99.4% en MNIST y 90%+ en CIFAR-10.
descriptionLong:
  en: |
    Neural network training project implementing MLPs for MNIST and CNNs for CIFAR-10 from scratch in PyTorch. Features a clean CLI (python main.py mnist/cifar) with configurable hyperparameters: batch size, learning rate, weight decay, epochs, label smoothing, and dropout. Uses a dataclass-based configuration system that auto-creates output directories. Training saves best models based on validation accuracy and logs experiment configs with final scores in filenames. MNIST reaches 99.47% accuracy, CIFAR achieves high 80s to low 90s depending on architecture. Includes Jupyter notebooks and uses maikol-utils for CLI formatting.
  es: |
    Proyecto de entrenamiento de redes neuronales implementando MLPs para MNIST y CNNs para CIFAR-10 desde cero en PyTorch. Cuenta con una CLI limpia (python main.py mnist/cifar) con hiperparámetros configurables: batch size, learning rate, weight decay, épocas, label smoothing y dropout. Usa un sistema de configuración basado en dataclasses que auto-crea directorios de salida. El entrenamiento guarda los mejores modelos según validation accuracy y registra las configuraciones de experimentos con los scores finales en el nombre. MNIST alcanza 99.47% de accuracy, CIFAR logra high 80s a low 90s según arquitectura. Incluye notebooks Jupyter y usa maikol-utils para formateo CLI.
